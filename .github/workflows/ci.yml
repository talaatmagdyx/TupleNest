name: CI
on:
  push: { branches: [main] }
  pull_request:
  # Advisories are published against code that has not changed. Without a
  # schedule, a new RUSTSEC entry is only noticed by whoever happens to push
  # next — which on a quiet week is nobody.
  schedule:
    - cron: "23 6 * * 1"
jobs:
  # Supply chain: is anything we link known-vulnerable, may we ship its licence,
  # and did it come from crates.io. Config and reasoning in deny.toml.
  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  # Prose, comments and identifiers. Config and the list of deliberate
  # exceptions in _typos.toml.
  typos:
    name: typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: crate-ci/typos@master

  rust:
    strategy:
      fail-fast: false
      matrix: { os: [ubuntu-latest, macos-latest, windows-latest] }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }

      # `apps/desktop/src-tauri` is a workspace member, so `--workspace` builds
      # the Tauri app — which on Linux links against webkit2gtk. Without these
      # the ubuntu leg cannot compile the workspace at all.
      - name: Linux system dependencies (Tauri)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            librsvg2-dev libxdo-dev libayatana-appindicator3-dev \
            build-essential curl wget file libssl-dev patchelf

      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings

      # `cargo test --workspace` includes credential-store's
      # `live_os_keychain_contract`, which talks to the real OS keychain. On
      # macOS and Windows the runner has one. On Linux the keychain *is* the
      # Secret Service, and a bare runner has no daemon owning
      # `org.freedesktop.secrets` — so the test panicked and this leg was red.
      #
      # The tempting fix is to skip it on Linux. That would be the worst
      # option: Linux is the one platform where this genuinely fails for real
      # users, because a desktop without a keyring daemon has nowhere to put a
      # password. Skipping would remove the coverage exactly where it is load
      # bearing, and turn a red leg into a green one that proves less.
      - name: Secret Service, so the Linux keyring is tested rather than skipped
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y gnome-keyring dbus-x11

      # `dbus-run-session` gives the whole command its own session bus, which is
      # what `gnome-keyring-daemon` registers the Secret Service on. It has to
      # wrap the tests in a single step: a bus started in an earlier step dies
      # with that step's shell, and its address would not reach this one.
      # `--unlock` reads the passphrase from stdin; empty is fine, the keyring
      # is created for this run and thrown away with the runner.
      - name: cargo test (Linux, with an unlocked keyring on a session bus)
        if: matrix.os == 'ubuntu-latest'
        run: |
          dbus-run-session -- bash -euo pipefail -c '
            # `--daemonize` so it forks and returns; without it the process
            # exited and nothing ever owned the name (the first attempt failed
            # exactly here). `eval` because the daemon prints the environment
            # it wants exported — GNOME_KEYRING_CONTROL and friends — and
            # dropping that output on the floor is how it half-works.
            eval "$(echo -n "" | gnome-keyring-daemon --unlock --components=secrets --daemonize)"

            # Claiming a bus name is not instant. Poll instead of sleeping a
            # fixed guess: a race here would fail intermittently, which is the
            # worst failure mode a CI check can have.
            for _ in $(seq 1 20); do
              if dbus-send --session --print-reply --dest=org.freedesktop.DBus \
                   /org/freedesktop/DBus org.freedesktop.DBus.ListNames 2>/dev/null \
                   | grep -q org.freedesktop.secrets; then
                echo "Secret Service is on the bus"; break
              fi
              sleep 1
            done

            # Prove it, and say why if not: without this the tests fail with a
            # DBus error that reads like a TupleNest bug rather than a missing
            # daemon. `dbus-send` not `busctl` — dbus-x11 is installed above,
            # busctl would be an unstated dependency on systemd.
            dbus-send --session --print-reply --dest=org.freedesktop.DBus \
              /org/freedesktop/DBus org.freedesktop.DBus.ListNames \
              | grep -q org.freedesktop.secrets || {
                echo "::error::no Secret Service on the bus — the keyring daemon did not start"
                echo "--- names on the bus:"
                dbus-send --session --print-reply --dest=org.freedesktop.DBus \
                  /org/freedesktop/DBus org.freedesktop.DBus.ListNames 2>&1 | head -30
                echo "--- daemon, in the foreground, to see what it says:"
                echo -n "" | timeout 10 gnome-keyring-daemon --unlock --components=secrets --foreground 2>&1 | head -20 || true
                exit 1
              }
            cargo test --workspace
          '

      - name: cargo test
        if: matrix.os != 'ubuntu-latest'
        run: cargo test --workspace

  # The contract tests: everything that can only be answered by a real server.
  # Cancellation, the 100k streaming checksum, TLS fails-closed, read-only
  # enforcement, generated columns, terminate-backend.
  #
  # These existed and never ran. 24 of the 72 Rust tests are `#[ignore]`d, the
  # plain `cargo test` above skips them, and there was no Postgres in CI — so
  # "query cancellation is a tested feature" was true of the file and of no
  # actual run. They are the tests most worth having and were the only ones
  # never executed.
  #
  # Linux only: the point is the database, not the client OS, and one runner
  # says everything three would.
  live-postgres:
    name: contract tests (PostgreSQL ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The oldest version the code can actually serve, through to current.
        # pg_partition_tree (PG 12) is the real floor; 13 is what the driver
        # advertises. Both are tested so the claim and the code stay in step.
        pg: [13, 15, 17]
    services:
      postgres:
        image: postgres:${{ matrix.pg }}
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
          # `test_config()` builds a ConnectionConfig with `secret_ref: None`
          # and the tests call `connect_concrete(test_config())`, which resolves
          # no password — so the driver sends none. With POSTGRES_PASSWORD set
          # and no auth method specified, the image demands scram-sha-256, and
          # tokio-postgres answers with `Error::config("password missing")`,
          # which surfaces as the wonderfully unhelpful "invalid configuration".
          # 33 of 34 tests failed that way on the first run of this job.
          #
          # `trust` makes the container behave like the local Homebrew server
          # these tests were written against, which is why they passed locally
          # and only ever failed here. It is a throwaway container bound to
          # localhost on an ephemeral runner.
          #
          # The `PGPASSWORD` that used to sit in this job's env was never read
          # by the Rust tests — only by `psql` in the TLS step below. It looked
          # like the password was configured. It was not.
          POSTGRES_HOST_AUTH_METHOD: trust
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
    env:
      TUPLENEST_TEST_PG_HOST: localhost
      TUPLENEST_TEST_PG_PORT: "5432"
      TUPLENEST_TEST_PG_DB: postgres
      TUPLENEST_TEST_PG_USER: postgres
      PGPASSWORD: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            librsvg2-dev libxdo-dev libayatana-appindicator3-dev \
            build-essential curl wget file libssl-dev patchelf
      # The TLS tests need a server with ssl=on and a cert whose SAN covers
      # localhost; without one they cannot prove fails-closed behaviour.
      - name: Enable TLS on the test server
        run: |
          set -euo pipefail
          sudo apt-get install -y postgresql-client openssl
          dir="$RUNNER_TEMP/pgtls"; mkdir -p "$dir"
          openssl req -new -x509 -days 1 -nodes -text \
            -out "$dir/server.crt" -keyout "$dir/server.key" \
            -subj "/CN=localhost" \
            -addext "subjectAltName=DNS:localhost,IP:127.0.0.1"
          chmod 600 "$dir/server.key"
          cid=$(docker ps --filter "ancestor=postgres:${{ matrix.pg }}" --format '{{.ID}}' | head -1)
          docker cp "$dir/server.crt" "$cid:/var/lib/postgresql/server.crt"
          docker cp "$dir/server.key" "$cid:/var/lib/postgresql/server.key"
          docker exec -u root "$cid" chown postgres:postgres \
            /var/lib/postgresql/server.crt /var/lib/postgresql/server.key
          docker exec -u postgres "$cid" psql -c "ALTER SYSTEM SET ssl = on"
          docker exec -u postgres "$cid" psql -c "ALTER SYSTEM SET ssl_cert_file = '/var/lib/postgresql/server.crt'"
          docker exec -u postgres "$cid" psql -c "ALTER SYSTEM SET ssl_key_file = '/var/lib/postgresql/server.key'"
          docker restart "$cid"
          for _ in $(seq 1 30); do pg_isready -h localhost -p 5432 && break; sleep 1; done
          cp "$dir/server.crt" "$RUNNER_TEMP/ca.crt"
      - name: Contract tests against a real server
        env:
          TUPLENEST_TEST_PG_SSL_CA: ${{ runner.temp }}/ca.crt
        # `--include-ignored`, or this job re-runs exactly the tests the job
        # above already ran and proves nothing.
        run: cargo test -p tuplenest-driver-postgres -- --include-ignored
  # SSH tunnels, against a real sshd.
  #
  # `ssh-core` had **zero** effective coverage: its only three tests were
  # `#[ignore]`d and nothing ran them, so host-key pinning — the thing standing
  # between a tunnelled production connection and a man in the middle — was
  # verified by reading the code and nothing else.
  #
  # The dev sshd from docs/dev-sshd.md is userland and needs no privileges, so
  # the same recipe works on a runner.
  live-ssh:
    name: SSH tunnel contract tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
    env:
      TUPLENEST_TEST_PG_HOST: localhost
      TUPLENEST_TEST_PG_PORT: "5432"
      TUPLENEST_TEST_PG_DB: postgres
      TUPLENEST_TEST_PG_USER: postgres
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Linux system dependencies (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            librsvg2-dev libxdo-dev libayatana-appindicator3-dev \
            build-essential curl wget file libssl-dev patchelf

      - name: Userland sshd on 127.0.0.1:2222
        run: |
          set -euo pipefail
          D="$HOME/.tuplenest-dev-sshd"
          mkdir -p "$D" && chmod 700 "$D" && cd "$D"
          ssh-keygen -q -t ed25519 -N "" -f host_ed25519
          ssh-keygen -q -t ed25519 -N "" -f client_ed25519
          cp client_ed25519.pub authorized_keys
          chmod 600 authorized_keys client_ed25519 host_ed25519
          cat > sshd_config <<EOF
          Port 2222
          ListenAddress 127.0.0.1
          HostKey $D/host_ed25519
          PidFile $D/sshd.pid
          AuthorizedKeysFile $D/authorized_keys
          PasswordAuthentication no
          KbdInteractiveAuthentication no
          PubkeyAuthentication yes
          UsePAM no
          StrictModes no
          AllowTcpForwarding yes
          X11Forwarding no
          Subsystem sftp internal-sftp
          LogLevel VERBOSE
          EOF
          # sshd refuses to start without its privilege separation directory,
          # and a runner that has never started ssh via systemd does not have
          # one. That is a fatal, exit-255, and the message only reaches the
          # log file — which `set -e` then aborted before printing. The first
          # run of this job failed with a bare "exit code 255" and an empty
          # log, which is my fault twice: once for the missing directory, once
          # for a diagnostic that could not diagnose.
          sudo mkdir -p /run/sshd

          # Validate the config before launching, so a syntax error says so
          # instead of arriving as 255.
          sudo /usr/sbin/sshd -t -f "$D/sshd_config" || {
            echo "::error::sshd rejected the config"; exit 1; }

          # `-e` sends errors to stderr as well, so whatever goes wrong is in
          # the step output rather than in a file nobody reaches.
          sudo /usr/sbin/sshd -f "$D/sshd_config" -E "$D/sshd.log" -e || {
            echo "::error::sshd exited $? at startup"
            echo "--- sshd.log:";        sudo cat "$D/sshd.log" 2>/dev/null || echo "(no log written)"
            echo "--- effective config:"; sudo /usr/sbin/sshd -T -f "$D/sshd_config" 2>&1 | head -20
            echo "--- /run/sshd:";        ls -ld /run/sshd 2>&1
            exit 1
          }

          # Fail here rather than inside a test, where "connection refused"
          # would read as a tunnel bug.
          for _ in $(seq 1 20); do
            if nc -z 127.0.0.1 2222; then echo "sshd up"; exit 0; fi
            sleep 1
          done
          echo "::error::sshd started but nothing is listening on 2222"
          sudo cat "$D/sshd.log" 2>/dev/null || true
          exit 1

      - name: Tunnel contract tests
        run: cargo test -p tuplenest-ssh-core -- --include-ignored

      - name: sshd log on failure
        if: failure()
        run: cat "$HOME/.tuplenest-dev-sshd/sshd.log" || true

  frontend:
    runs-on: ubuntu-latest
    # This job used to `echo` the commands below instead of running them — a
    # placeholder from the scaffold, left in long after the frontend existed.
    # Nothing here had ever run in CI: not the lint, not the types, not the
    # 1,500 tests.
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      # Coverage rather than a bare `vitest run`: same tests, but it also
      # enforces the thresholds in vitest.config.ts. Left as `npm test`, the
      # thresholds would sit in the config being decorative.
      - run: npm run test:coverage
