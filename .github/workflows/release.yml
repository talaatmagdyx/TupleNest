name: Release

# Cross-compiling a Tauri app is not practical: Windows needs MSVC and WebView2,
# Linux needs webkit2gtk, macOS needs the Apple toolchain. Each platform builds
# on its own runner. That is why this exists as a matrix rather than a script
# someone runs on a laptop.
#
# Triggered by a version tag, or by hand from the Actions tab.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      # One platform failing should not hide the others' results.
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS (Apple Silicon)
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS (Intel)
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux (x86_64)
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows (x86_64)

    name: ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}

    # The `secrets` context cannot be read from a step-level `if:`, so the
    # "does this secret exist" question is answered once here and the steps
    # branch on the answer. Comparing to '' is the only way to distinguish an
    # absent secret from a present one — its value is never exposed.
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      HAS_APPLE_ID: ${{ secrets.APPLE_ID != '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # Built on 22.04 rather than latest: the glibc a distro ships is the
      # oldest one the binary will run on, so building on the newest Ubuntu
      # would quietly drop support for every older machine.
      - name: Linux system dependencies
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            librsvg2-dev libxdo-dev libayatana-appindicator3-dev \
            build-essential curl wget file libssl-dev patchelf

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      # Sign a throwaway file before spending twelve minutes compiling.
      #
      # `bundle.createUpdaterArtifacts` is on, so the very last thing a release
      # build does is sign — which means a wrong signing password wastes the
      # entire build on every platform and then reports
      # "failed to decode secret key: incorrect updater private key password"
      # under a log full of successful bundles. That is exactly how the first
      # v0.1.0-beta.1 attempt failed: deb, rpm and AppImage all built, then the
      # signature killed it.
      #
      # Twenty seconds here turns that into a named failure before any
      # compilation. The probe file must exist: `signer sign` checks the
      # password first and the file second, so a missing file fails for the
      # wrong reason and would read as a pass.
      - name: Preflight — the updater key and its password must actually work
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        working-directory: apps/desktop
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY is not set — the build would produce installers and then fail at signing."
            exit 1
          fi
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > "$RUNNER_TEMP/tn.key"
          echo preflight > "$RUNNER_TEMP/tn_probe.txt"
          if ! npx tauri signer sign \
                 -f "$RUNNER_TEMP/tn.key" \
                 -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
                 "$RUNNER_TEMP/tn_probe.txt" > "$RUNNER_TEMP/tn_probe.log" 2>&1; then
            echo "::error::Cannot sign with the configured updater key. The build would have failed after ~12 minutes of compiling."
            # The message names the cause: wrong password vs unreadable key are
            # different problems with different fixes.
            sed -e 's/^/    /' "$RUNNER_TEMP/tn_probe.log" | head -5
            echo ""
            echo "If this says 'Wrong password for that key': the secret does not match the key."
            echo "A trailing newline is the usual reason — set it with printf, which adds none:"
            echo "    printf %s 'your passphrase' | gh secret set TAURI_SIGNING_PRIVATE_KEY_PASSWORD"
            rm -f "$RUNNER_TEMP/tn.key" "$RUNNER_TEMP/tn_probe.txt" "$RUNNER_TEMP/tn_probe.txt.sig"
            exit 1
          fi
          rm -f "$RUNNER_TEMP/tn.key" "$RUNNER_TEMP/tn_probe.txt" "$RUNNER_TEMP/tn_probe.txt.sig"
          echo "Updater key and password verified — the signing step at the end will work."

      # The same gates CI runs, once per platform: a release should not be the
      # first time these are checked on this OS.
      - name: Check
        working-directory: apps/desktop
        run: |
          npm run lint
          npm run typecheck
          npm test

      # Apple signing is opt-in, and it has to be opt-in by the variable being
      # ABSENT — not empty.
      #
      # Tauri's bundler enables macOS codesigning when APPLE_CERTIFICATE is
      # *defined*: `std::env::var` returns Ok("") for a variable that is set to
      # the empty string, so an `env:` block listing a secret that does not
      # exist still turns signing on, with an empty certificate. Every macOS
      # bundle then died at:
      #
      #   failed to bundle project: failed codesign application:
      #   failed to run command security import: failed to import keychain certificate
      #
      # That is what killed the first v0.1.0-beta.1 build, on the leg that had
      # nothing to do with signing. The comment that used to sit here claimed
      # the opposite — "absent, the mac builds are ad-hoc signed" — which was
      # never true and had never been run.
      #
      # `$GITHUB_ENV` is the only way to set a variable conditionally: an `env:`
      # key always exists. HAS_APPLE_CERT is computed at job level because the
      # `secrets` context is not available in a step-level `if:`.
      - name: Apple signing — only when a certificate actually exists
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true'
        run: |
          {
            echo "APPLE_CERTIFICATE<<__TN_EOF__"
            echo "${{ secrets.APPLE_CERTIFICATE }}"
            echo "__TN_EOF__"
            echo "APPLE_CERTIFICATE_PASSWORD=${{ secrets.APPLE_CERTIFICATE_PASSWORD }}"
            echo "APPLE_SIGNING_IDENTITY=${{ secrets.APPLE_SIGNING_IDENTITY }}"
          } >> "$GITHUB_ENV"
          echo "Apple certificate present — bundles will be Developer ID signed."

      # Notarization is a second, independent thing: it needs an Apple ID as
      # well as a certificate, and asking for it without one hangs or errors
      # rather than skipping.
      - name: Apple notarization — only when the Apple ID exists too
        if: runner.os == 'macOS' && env.HAS_APPLE_CERT == 'true' && env.HAS_APPLE_ID == 'true'
        run: |
          {
            echo "APPLE_ID=${{ secrets.APPLE_ID }}"
            echo "APPLE_PASSWORD=${{ secrets.APPLE_PASSWORD }}"
            echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}"
          } >> "$GITHUB_ENV"
          echo "Apple ID present — bundles will be notarized and stapled."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # `bundle.createUpdaterArtifacts` is on, so every bundle is signed for
          # the updater. Without this secret the build fails at the signing step
          # *after* producing the installers — which looks like it worked.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # APPLE_* deliberately absent here — see the two steps above. Without
          # an Apple Developer account the macOS bundles are ad-hoc signed and
          # Gatekeeper warns on first launch; that is the documented, tested
          # state, and now actually the behaviour.
        with:
          projectPath: apps/desktop
          args: --target ${{ matrix.target }}
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-dev', github.run_number) }}
          releaseName: TupleNest ${{ github.ref_type == 'tag' && github.ref_name || 'dev build' }}
          releaseBody: |
            See the assets below. Every platform is built on its own runner.

            The macOS builds are not notarized unless an Apple Developer
            certificate is configured, so the first launch needs Gatekeeper
            approval — the README explains how.
          # The updater reads
          # github.com/talaatmagdyx/TupleNest/releases/latest/download/latest.json,
          # which this generates from the per-platform .sig files. Without it
          # the endpoint 404s and no installed copy ever sees an update.
          includeUpdaterJson: true
          # Draft on purpose — nothing ships until it is published by hand.
          # Worth knowing: a draft is not "latest", so the updater URL stays a
          # 404 until you hit Publish. That is the intended sequence, not a
          # bug: the release goes public and existing copies see it at the same
          # moment.
          releaseDraft: true
          # A manual dispatch build is not a release. Left as `false`, publishing
          # a `v47-dev` draft by hand would make it "latest" and the updater
          # would ship a scratch build to every install.
          # A tag containing a hyphen (v0.1.0-beta.1) is a prerelease channel
          # and must be labeled as one: GitHub does not treat a prerelease as
          # `latest`, so beta installs never become the updater target for
          # people on stable — and betas can be published without committing
          # every existing install to them.
          #
          # Deliberate: the beta lives in the TAG, not in tauri.conf's version,
          # which stays numeric (0.1.0). WiX rejects semver prerelease suffixes
          # in MSI versions, so `0.1.0-beta.1` as the app version would kill
          # the Windows leg at bundling.
          prerelease: ${{ github.ref_type != 'tag' || contains(github.ref_name, '-') }}

  # Checksums and an SBOM, attached to the same release.
  #
  # These matter more here than they would elsewhere: the Windows installer is
  # unsigned and the macOS builds are not notarized, so a published SHA-256 is
  # the *only* integrity signal a downloader has. Nothing verified the bytes.
  provenance:
    name: checksums, SBOM and attestation
    needs: build
    if: always() && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # For actions/attest-build-provenance: signs a statement that these
      # artifacts came out of this workflow, from this commit.
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v4

      - name: Collect the release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-dev', github.run_number) }}
        run: |
          set -euo pipefail
          mkdir -p dist
          # The release is a draft, so `gh release download` needs the tag.
          gh release download "$TAG" --dir dist --pattern '*' || true
          ls -la dist

      - name: SHA-256SUMS
        run: |
          set -euo pipefail
          cd dist
          # latest.json is generated from the .sig files and changes if anyone
          # re-uploads; checksumming the installers is the point.
          rm -f SHA256SUMS latest.json
          shasum -a 256 * > SHA256SUMS
          cat SHA256SUMS

      # `set -euo pipefail` was here doing nothing: every line that could fail
      # ended in `|| true`, so a broken cargo-cyclonedx produced no SBOM, no
      # error, and a green job — while the README told people a release ships
      # one. An SBOM that silently might not exist is not a supply-chain
      # control, it is a claim. Only the install keeps its `|| true`, because
      # the binary may already be cached; the generate and the copy must work.
      - name: SBOM
        run: |
          set -euo pipefail
          cargo install --locked cargo-cyclonedx || true
          command -v cargo-cyclonedx >/dev/null || { echo "cargo-cyclonedx did not install"; exit 1; }
          # One .cdx.json per crate, written next to each Cargo.toml.
          cargo cyclonedx --format json --all
          find . -maxdepth 3 -name '*.cdx.json' -exec cp {} dist/ \;
          cd apps/desktop && npm ci --ignore-scripts && npm sbom --sbom-format cyclonedx > ../../dist/frontend-sbom.cdx.json
          cd ../..
          # Prove it rather than hope: one per workspace crate, plus the frontend.
          count=$(ls dist/*.cdx.json | wc -l)
          echo "SBOMs collected: $count"; ls -1 dist/*.cdx.json
          [ "$count" -ge 2 ] || { echo "expected at least a Rust and a frontend SBOM"; exit 1; }

      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: "dist/*"

      - name: Attach to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}-dev', github.run_number) }}
        run: gh release upload "$TAG" dist/SHA256SUMS dist/*.cdx.json --clobber
